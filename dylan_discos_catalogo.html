<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dylan Discos – Catálogo Consignado</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;font-size:13px;background:#1a1a2e;color:#eee;min-height:100vh}
header{background:#0f3460;padding:12px 20px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.5);flex-wrap:wrap}
header h1{font-size:16px;color:#e94560;flex:1;min-width:150px}
.stats{display:flex;gap:7px;flex-wrap:wrap}
.stat{background:rgba(255,255,255,.1);border-radius:6px;padding:3px 8px;text-align:center;min-width:52px}
.stat label{display:block;font-size:10px;color:#aaa}
.stat span{display:block;font-size:15px;font-weight:bold}
.stat.s-sold span{color:#e94560}.stat.s-avail span{color:#4ecca3}
.stat.s-total span,.stat.s-val span{color:#f5a623}.stat.s-val span{font-size:12px}
.controls{background:#16213e;padding:9px 20px;display:flex;gap:7px;flex-wrap:wrap;align-items:center;border-bottom:1px solid #0f3460}
.controls input{background:#0f3460;border:1px solid #e94560;color:#eee;border-radius:6px;padding:5px 9px;font-size:12px;width:180px}
.controls input::placeholder{color:#888}
.bf{border:none;border-radius:6px;padding:5px 11px;cursor:pointer;font-size:11px;font-weight:bold;transition:all .2s}
.bf.active{background:#e94560;color:#fff}.bf:not(.active){background:#0f3460;color:#aaa}
.bf.reset{background:#333;color:#999}
table{width:100%;border-collapse:collapse}
th{background:#0f3460;color:#e94560;padding:8px;text-align:left;font-size:11px;letter-spacing:.4px;position:sticky;top:52px;z-index:50}
td{padding:5px 7px;border-bottom:1px solid #1a2a4a;vertical-align:middle}
tr.available:hover{background:#16213e}
tr.sold-row{opacity:.4}
tr.sold-row .nome{text-decoration:line-through;color:#666}
.num{color:#555;font-size:11px;width:26px;text-align:center}
.thumb img{width:50px;height:50px;object-fit:cover;border-radius:4px;display:block;cursor:zoom-in}
.thumb{width:58px}
.nome{font-weight:bold;color:#eee;font-size:12px}
.artist{color:#aaa;font-size:11px}.album{color:#ccc;font-size:11px}
.price{font-weight:bold;color:#f5a623;white-space:nowrap}
.sbtn{border:none;border-radius:20px;padding:4px 10px;cursor:pointer;font-size:11px;font-weight:bold;transition:all .2s;white-space:nowrap}
.sbtn.avail{background:#4ecca3;color:#000}.sbtn.sold{background:#e94560;color:#fff}
.pv{background:#f5a623;color:#000;font-size:9px;font-weight:bold;border-radius:3px;padding:1px 4px;margin-left:3px;vertical-align:middle}
.hidden{display:none!important}
#no-results{color:#888;text-align:center;padding:40px;display:none}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:999;align-items:center;justify-content:center}
.modal.open{display:flex}
.modal img{max-width:90vw;max-height:90vh;border-radius:8px;box-shadow:0 8px 32px #000}
.mcl{position:fixed;top:10px;right:14px;color:#fff;font-size:22px;cursor:pointer;background:rgba(0,0,0,.5);border:none;border-radius:50%;width:30px;height:30px;line-height:30px;text-align:center}
</style>
</head>

// ── CONFIG ────────────────────────────────────────────────────────────────
const WORKER = 'https://broad-unit-4b9cnotion-proxy.frederico-fcb.workers.dev';
const DB_ID  = '36ca6605-a4aa-8029-8374-e9612992f173';

// ── ESTADO ────────────────────────────────────────────────────────────────
let soldSet = new Set();
let pageMap = {};  // itemId → Notion page ID
let cur = 'all';

// ── NOTION HELPER ─────────────────────────────────────────────────────────
// IMPORTANTE: NÃO enviamos Notion-Version nem Authorization aqui.
// O Worker adiciona esses headers server-side (igual ao catalogar.html).
async function notionReq(path, method='POST', body=null){
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json' }
  };
  if(body) opts.body = JSON.stringify(body);
  const res = await fetch(`${WORKER}/v1${path}`, opts);
  if(!res.ok){
    const txt = await res.text();
    throw new Error(`HTTP ${res.status}: ${txt}`);
  }
  return res.json();
}

// ── LOAD ──────────────────────────────────────────────────────────────────
async function loadSold(){
  try{
    const data = await notionReq(`/databases/${DB_ID}/query`, 'POST', {});
    data.results.forEach(p => {
      const title   = p.properties.Nome?.title?.[0]?.plain_text;
      const vendido = p.properties.Vendido?.select?.name === 'Vendido';
      const id      = parseInt(title);
      if(!isNaN(id)){
        pageMap[id] = p.id;
        if(vendido) soldSet.add(id);
      }
    });
    console.log('✅ Notion OK. Vendidos:', [...soldSet]);
  } catch(e){
    console.warn('⚠️ Notion indisponível, usando localStorage.', e.message);
    const ls = JSON.parse(localStorage.getItem('dylan_sold_v1') || '[]');
    ls.forEach(id => soldSet.add(id));
  }
}

// ── SAVE ──────────────────────────────────────────────────────────────────
async function saveSold(itemId, isSold){
  localStorage.setItem('dylan_sold_v1', JSON.stringify([...soldSet]));
  try{
    if(pageMap[itemId]){
      await notionReq(`/pages/${pageMap[itemId]}`, 'PATCH',
        { properties: { Vendido: { select: isSold ? { name: 'Vendido' } : null } } });
    } else {
      const disco = DATA.find(d => d.id === itemId);
      const label = disco ? `${disco.artist} – ${disco.album}` : String(itemId);
      const res = await notionReq('/pages', 'POST', {
        parent: { database_id: DB_ID },
        properties: {
          Nome:    { title: [{ text: { content: label } }] },
          Vendido: { select: isSold ? { name: 'Vendido' } : null },
          Preço:   { number: disco ? disco.price : null }
        }
      });
      if(res.id) pageMap[itemId] = res.id;
    }
    console.log(`✅ Item ${itemId} salvo no Notion (vendido=${isSold})`);
  } catch(e){
    console.error('❌ Erro ao salvar no Notion:', e.message);
  }
}

// ── TOGGLE ────────────────────────────────────────────────────────────────
async function toggleSold(id){
  const isSold = !soldSet.has(id);
  isSold ? soldSet.add(id) : soldSet.delete(id);
  renderRow(id); updateStats();
  await saveSold(id, isSold);
}

// ── RESET ─────────────────────────────────────────────────────────────────
async function resetSold(){
  if(!confirm('Resetar todas as marcações de VENDIDO?')) return;
  const ids = [...soldSet];
  soldSet.clear();
  localStorage.removeItem('dylan_sold_v1');
  render(); applyFilters();
  for(const id of ids){
    if(pageMap[id]){
      await notionReq(`/pages/${pageMap[id]}`, 'PATCH',
        { properties: { Vendido: { checkbox: false } } }).catch(()=>{});
    }
  }
}

// ── FILTROS / STATS ───────────────────────────────────────────────────────
let cur2='all';
function setFilter(f){
  cur=f;
  ['all','avail','sold'].forEach(x=>document.getElementById('f-'+x).classList.toggle('active',x===f));
  applyFilters();
}
function applyFilters(){
  const q=document.getElementById('search').value.toLowerCase(); let v=0;
  document.querySelectorAll('#tbody tr').forEach(tr=>{
    const id=parseInt(tr.dataset.id); const isSold=soldSet.has(id);
    const ok=(!q||tr.dataset.text.includes(q))&&
      (cur==='all'||(cur==='sold'&&isSold)||(cur==='avail'&&!isSold));
    tr.classList.toggle('hidden',!ok); if(ok) v++;
  });
  document.getElementById('no-results').style.display=v?'none':'block';
  updateStats();
}
function updateStats(){
  document.getElementById('ct').textContent=DATA.length;
  document.getElementById('cs').textContent=soldSet.size;
  document.getElementById('ca').textContent=DATA.length-soldSet.size;
  document.getElementById('cv').textContent='R$'+
    DATA.filter(r=>!soldSet.has(r.id)).reduce((a,r)=>a+r.price,0);
}

// ── RENDER ────────────────────────────────────────────────────────────────
function renderRow(id){
  const isSold=soldSet.has(id);
  const tr=document.querySelector(`tr[data-id="${id}"]`); if(!tr) return;
  tr.className=isSold?'sold-row':'available';
  const btn=tr.querySelector('.sbtn');
  btn.className='sbtn '+(isSold?'sold':'avail');
  btn.textContent=isSold?'✓ VENDIDO':'Disponível';
}
function render(){
  const tbody=document.getElementById('tbody'); tbody.innerHTML='';
  DATA.forEach(r=>{
    const isSold=soldSet.has(r.id);
    const pv=r.artist==='PRECISA VALIDAR'?'<span class="pv">PV</span>':'';
    const tr=document.createElement('tr');
    tr.dataset.id=r.id; tr.dataset.text=(r.artist+' '+r.album).toLowerCase();
    tr.className=isSold?'sold-row':'available';
    tr.innerHTML=`<td class="num">${r.id}</td>
      <td class="thumb"><img src="data:image/jpeg;base64,${r.img}" onclick="openModal(this.src)"></td>
      <td class="nome">${r.artist} – ${r.album}${pv}</td>
      <td class="artist">${r.artist}</td><td class="album">${r.album}</td>
      <td class="price">R$ ${r.price}</td>
      <td><button class="sbtn ${isSold?'sold':'avail'}" onclick="toggleSold(${r.id})">${isSold?'✓ VENDIDO':'Disponível'}</button></td>`;
    tbody.appendChild(tr);
  }); updateStats();
}

// ── MODAL ─────────────────────────────────────────────────────────────────
function openModal(src){document.getElementById('mimg').src=src;document.getElementById('modal').classList.add('open')}
function closeModal(){document.getElementById('modal').classList.remove('open')}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});

// ── INIT ──────────────────────────────────────────────────────────────────
(async()=>{
  document.getElementById('tbody').innerHTML=
    '<tr><td colspan="7" style="text-align:center;padding:30px;color:#aaa">⏳ Sincronizando com Notion…</td></tr>';
  await loadSold();
